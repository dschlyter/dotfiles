# Press prefix + I (capital i, as in Install) to fetch the plugin.
# Debug with bash -x $HOME/.tmux/plugins/tpm/tpm
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'

set-option -g default-shell /bin/zsh

# reload config for quick iterations
bind-key R source-file ~/.tmux.conf \; display-message "Config reloaded"

# name is empty until explicitly set
set-option -g automatic-rename on
set-option -g automatic-rename-format ''

# avoid gaps in the windows
set -g renumber-windows on

# enable colors - use environment variable to control terminal type
# Set TMUX_TERM_TYPE=screen to use screen-256color (legacy fallback), defaults to tmux-256color
if-shell '[ -n "$TMUX_TERM_TYPE" ]' 'set -g default-terminal "$TMUX_TERM_TYPE-256color"' 'set -g default-terminal "tmux-256color"'
# assume parent terminal supports colors
set-option -ga terminal-overrides ",*-256color*:TC"

# sort of vim style movement between panes
bind-key -r j select-pane -t :.+
bind-key -r k select-pane -t :.-

# incremental fzf search across all sessions/windows
bind-key f run "tmux split-window -l 12 '~/.tmux-scripts/fzf-switch.sh'"

# quickly switch windows (bind these to iterm-keys on mac)
bind-key -n M-p select-window -t :-
bind-key -n M-n select-window -t :+
bind-key -n M-h select-window -t :-
bind-key -n M-l select-window -t :+
bind-key -n M-P swap-window -d -t :-
bind-key -n M-N swap-window -d -t :+
bind-key -n M-H swap-window -d -t :-
bind-key -n M-L swap-window -d -t :+
bind-key -n M-j run-shell "~/.tmux-scripts/next-pane-nested.sh next"
bind-key -n M-k run-shell "~/.tmux-scripts/next-pane-nested.sh prev"

# easy-to-remember split pane commands, inspired by vim
bind-key h split-window -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# break and join panes between windows, analogous to window/pane creation
bind-key C break-pane
bind-key V choose-window 'join-pane -h -s "%%"'
bind-key H choose-window 'join-pane -v -s "%%"'

# session management
bind-key s run-shell '~/.tmux-scripts/create-session.sh'
bind-key S choose-session "run-shell '~/.tmux-scripts/move-window-to-session.sh %%'"
bind-key -n M-J run -b '~/.tmux-scripts/switch-session.sh next'
bind-key -n M-K run -b '~/.tmux-scripts/switch-session.sh prev'
bind-key _ command-prompt -I "#S" "rename-session -- '%%'"
bind-key G choose-tree -s "move-window -a -s '%%' -t ''"
# jump to first window of first session
bind-key b run-shell '~/.tmux-scripts/jump-first.sh'
# When a session is destroyed (last pane exits), switch to previous session instead of detaching
set-option -g detach-on-destroy previous

# resize with arrow keys, step size 2 is granular enough
bind-key -r Up    resize-pane -U 2
bind-key -r Down  resize-pane -D 2
bind-key -r Left  resize-pane -L 2
bind-key -r Right resize-pane -R 2

# default keys for next/prev panes, but repeatable (useful inside nested tmux)
bind-key -r n next-window
bind-key -r p previous-window

# default keys for swapping panes, but repeatable
bind-key -r "{" swap-pane -U
bind-key -r "}" swap-pane -D
bind-key -r C-o rotate-window
bind-key -r M-o rotate-window -D

# promote a single pane to master, awesome wm style (move unused mark func to capital M)
bind-key m swap-pane -s 0
bind-key M select-pane -m

# rearrange a single pane to be horizontal or verical (layout of other panes is kept)
bind-key - move-pane -t '.-'
bind-key | move-pane -h -t '.-'

# vim keys for copying - with some tweaks for maximum speed
set -g mode-keys vi
bind-key C-p paste-buffer
bind-key P paste-buffer
bind-key C-c copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'p' send -X copy-selection-and-cancel \; paste-buffer \; send-keys " "
# copy-mode with cursor in the previous command
bind-key C-k copy-mode \; send-keys 0k
# quick start scrolling, start searching
bind-key C-u copy-mode \; send-keys C-u
bind-key / copy-mode \; send-keys ?
# incremental search is nice
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# integrated cheatsheet in tmux :D
bind-key M-c split-window less ~/.dotfiles/cheatsheet_tmux.txt

# enable mouse
set -g mouse on
# set -g terminal-overrides 'xterm*:smcup@:rmcup@' # make scrolling work ???

# start on 1, since 0 is a bit off on the keyboard
set -g base-index 1

# notify on window activity, but not too much (see activity colors below)
set-option -g visual-activity off
set-option -g bell-action none
set-window-option -g monitor-activity off
set-option -g visual-bell on

# look and feel, modified from http://www.hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/

# Active window - White text on clear blue
# Default window name is just the path, but append the actual window name if it is set
setw -g window-status-current-style fg=colour15,bg=colour33,bold
setw -g window-status-current-format ' #I#[fg=colour15] #[fg=colour15,bold]#{?#{window_name},#W,#{b:pane_current_path}}#[fg=colour15,bold]#{?window_zoomed_flag,#[fg=red][Z]#[fg=default] ,} '

# Inactive windows - Light gray text on dark gray background
setw -g window-status-style fg=colour250,bg=colour235
setw -g window-status-format ' #I#[fg=colour244] #[fg=colour250]#{?#{window_name},#W,#{b:pane_current_path}}#[fg=colour244]#{?window_zoomed_flag,[Z] ,} '

# Window prints text in the background - Light gray text on dark red background
setw -g window-status-activity-style fg=colour250,bg=colour52

# Window has a bell trigger - White text on bright red
setw -g window-status-bell-style bg=colour196,fg=colour15,bold

# Color when copying text, or doing scrollback - Red text on black background
setw -g mode-style fg=red,bg=black,bold

# Border colors - Clear blue active, dark grey inactive
set -g pane-active-border-style fg=colour33
set -g pane-border-style fg=colour235

# message style - like ctrl-b : to enter commands - White text on bright red
set -g message-style fg=colour15,bg=colour196
set -g message-command-style fg=colour15,bg=colour196

# Status line - dark blue/cyan background
# set -g status-utf8 on
set -g status-position top
set -g status-style fg=colour15,bg=colour24
set -g status-justify left
set -g status-interval 2

# Left status bar - unused
set -g status-left ''
set -g status-left-length 30

# Right status bar - clear blue background
set -g status-right ' #[fg=colour15,bg=colour33,bold] #S #[default]'
set -g status-right-length 80

# Claude session manager - transition "done" -> "idle" when pane gets focus
set-hook -g after-select-pane 'run-shell -b "TMUX_PANE=#{pane_id} cma hook pane-focus"'
set-hook -g after-select-window 'run-shell -b "TMUX_PANE=#{pane_id} cma hook pane-focus"'
set-hook -g client-session-changed 'run-shell -b "TMUX_PANE=#{pane_id} cma hook pane-focus"'
bind-key -n M-A 'run-shell -b "TMUX_PANE=#{pane_id} cma next"'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if-shell "test -f ~/.tmux/plugins/tpm/tpm" "run -b '~/.tmux/plugins/tpm/tpm'"
